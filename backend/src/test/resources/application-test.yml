spring:
  datasource:
    # L'URL est gérée dynamiquement par Testcontainers via @ServiceConnection
    # ou via spring.datasource.url injecté par le ContainerDatasourceConnectionDetailsFactory.
    # Ne pas définir d'URL statique ici — Testcontainers la fournit au démarrage du container.
    url:
    username:
    password:

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
