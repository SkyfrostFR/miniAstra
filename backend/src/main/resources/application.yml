spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/miniastra}
    username: ${DB_USER:miniastra}
    password: ${DB_PASSWORD:miniastra}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # "validate" : Hibernate vérifie que le schéma DB correspond aux entités
      # mais ne le modifie pas — Flyway est seul responsable des migrations.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

app:
  cors:
    allowed-origins: ""
